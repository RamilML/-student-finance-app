<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Финансовый Трекер</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .auth-container, .app-container {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .hidden { display: none !important; }
        h1, h2 { color: #333; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #555; font-weight: 500; }
        input, select {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        button.danger {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .tab-btn {
            background: #f0f0f0;
            color: #333;
        }
        .tab-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .expenses-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        .expenses-table th, .expenses-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        .expenses-table th {
            background: #f8f9fa;
            color: #333;
            font-weight: 600;
        }
        .expenses-table tr:hover { background: #f8f9fa; }
        .filters {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .chart-container {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
        }
        .budget-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .budget-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }
        .budget-card.exceeded { border-left-color: #f5576c; }
        .budget-card .limit { font-size: 24px; font-weight: bold; color: #333; }
        .budget-card .spent { font-size: 18px; color: #666; margin: 10px 0; }
        .budget-card .remaining { font-size: 14px; color: #888; }
        .budget-card .exceeded-text { color: #f5576c; font-weight: bold; }
        .user-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }
        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .alert-success { background: #d4edda; color: #155724; }
        .alert-error { background: #f8d7da; color: #721c24; }
        .inline-form {
            display: flex;
            gap: 10px;
            align-items: flex-end;
            flex-wrap: wrap;
        }
        .inline-form .form-group { margin-bottom: 0; }
        @media (max-width: 768px) {
            .filters { grid-template-columns: 1fr; }
            .inline-form { flex-direction: column; }
            .inline-form .form-group { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Авторизация -->
        <div id="authSection" class="auth-container">
            <h1>🔐 Финансовый Трекер</h1>
            <div id="loginForm">
                <h2>Вход</h2>
                <div class="form-group">
                    <label>Имя пользователя</label>
                    <input type="text" id="loginUsername" placeholder="Введите имя">
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="loginPassword" placeholder="Введите пароль">
                </div>
                <button onclick="login()">Войти</button>
                <p style="margin-top: 15px;">Нет аккаунта? <a href="#" onclick="showRegister()">Зарегистрироваться</a></p>
            </div>
            <div id="registerForm" class="hidden">
                <h2>Регистрация</h2>
                <div class="form-group">
                    <label>Имя пользователя</label>
                    <input type="text" id="regUsername" placeholder="Придумайте имя">
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="regPassword" placeholder="Придумайте пароль">
                </div>
                <button onclick="register()">Зарегистрироваться</button>
                <p style="margin-top: 15px;">Есть аккаунт? <a href="#" onclick="showLogin()">Войти</a></p>
            </div>
            <div id="authMessage" class="alert hidden"></div>
        </div>

        <!-- Приложение -->
        <div id="appSection" class="app-container hidden">
            <div class="user-info">
                <h2>💰 Финансовый Трекер</h2>
                <div>
                    <span id="usernameDisplay"></span>
                    <button onclick="logout()" class="danger" style="margin-left: 10px;">Выйти</button>
                </div>
            </div>

            <div class="tabs">
                <button class="tab-btn active" onclick="showTab('expenses')">Расходы</button>
                <button class="tab-btn" onclick="showTab('addExpense')">Добавить</button>
                <button class="tab-btn" onclick="showTab('budget')">Бюджет</button>
                <button class="tab-btn" onclick="showTab('charts')">Графики</button>
            </div>

            <!-- Расходы -->
            <div id="expensesTab" class="tab-content active">
                <h3>Список расходов</h3>
                <div class="filters">
                    <div class="form-group">
                        <label>Категория</label>
                        <input type="text" id="filterCategory" placeholder="Все категории">
                    </div>
                    <div class="form-group">
                        <label>Мин. сумма</label>
                        <input type="number" id="filterMinAmount" placeholder="0">
                    </div>
                    <div class="form-group">
                        <label>С даты</label>
                        <input type="date" id="filterStartDate">
                    </div>
                    <div class="form-group">
                        <label>По дату</label>
                        <input type="date" id="filterEndDate">
                    </div>
                    <div class="form-group">
                        <label>Сортировка</label>
                        <select id="sortBy">
                            <option value="date">По дате</option>
                            <option value="amount">По сумме</option>
                            <option value="title">По названию</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Порядок</label>
                        <select id="sortOrder">
                            <option value="desc">По убыванию</option>
                            <option value="asc">По возрастанию</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Лимит</label>
                        <input type="number" id="limit" placeholder="Все" value="50">
                    </div>
                    <div class="form-group" style="display: flex; align-items: flex-end;">
                        <button onclick="loadExpenses()">Применить</button>
                    </div>
                </div>
                <table class="expenses-table">
                    <thead>
                        <tr>
                            <th>Название</th>
                            <th>Категория</th>
                            <th>Сумма</th>
                            <th>Дата</th>
                            <th>Действия</th>
                        </tr>
                    </thead>
                    <tbody id="expensesTableBody"></tbody>
                </table>
            </div>

            <!-- Добавить расход -->
            <div id="addExpenseTab" class="tab-content">
                <h3>Добавить новый расход</h3>
                <div class="inline-form">
                    <div class="form-group">
                        <label>Название</label>
                        <input type="text" id="expenseTitle" placeholder="Например: Продукты">
                    </div>
                    <div class="form-group">
                        <label>Категория</label>
                        <input type="text" id="expenseCategory" placeholder="Например: Еда">
                    </div>
                    <div class="form-group">
                        <label>Сумма</label>
                        <input type="number" step="0.01" id="expenseAmount" placeholder="0.00">
                    </div>
                    <div class="form-group">
                        <label>Дата</label>
                        <input type="date" id="expenseDate">
                    </div>
                    <div class="form-group">
                        <button onclick="addExpense()">Добавить</button>
                    </div>
                </div>
                <div id="addExpenseMessage" class="alert hidden"></div>
            </div>

            <!-- Бюджет -->
            <div id="budgetTab" class="tab-content">
                <h3>Управление бюджетом</h3>
                <div class="inline-form" style="margin-bottom: 20px;">
                    <div class="form-group">
                        <label>Категория (опционально)</label>
                        <input type="text" id="budgetCategory" placeholder="Все или конкретная">
                    </div>
                    <div class="form-group">
                        <label>Лимит суммы</label>
                        <input type="number" step="0.01" id="budgetLimitAmount" placeholder="0.00">
                    </div>
                    <div class="form-group">
                        <label>Период</label>
                        <select id="budgetPeriod">
                            <option value="daily">Ежедневно</option>
                            <option value="weekly">Еженедельно</option>
                            <option value="monthly">Ежемесячно</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <button onclick="addBudgetLimit()">Установить лимит</button>
                    </div>
                </div>
                <h4>Статус бюджета</h4>
                <div id="budgetStatus" class="budget-cards"></div>
            </div>

            <!-- Графики -->
            <div id="chartsTab" class="tab-content">
                <h3>Аналитика расходов</h3>
                <div class="filters">
                    <div class="form-group">
                        <label>С даты</label>
                        <input type="date" id="chartStartDate">
                    </div>
                    <div class="form-group">
                        <label>По дату</label>
                        <input type="date" id="chartEndDate">
                    </div>
                    <div class="form-group" style="display: flex; align-items: flex-end;">
                        <button onclick="loadCharts()">Обновить</button>
                    </div>
                </div>
                <div class="charts-grid">
                    <div class="chart-container">
                        <canvas id="categoryChart"></canvas>
                    </div>
                    <div class="chart-container">
                        <canvas id="dateChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000';
        let token = localStorage.getItem('token');
        let categoryChartInstance = null;
        let dateChartInstance = null;

        // Проверка авторизации при загрузке
        if (token) {
            showApp();
        }

        function showAuth() {
            document.getElementById('authSection').classList.remove('hidden');
            document.getElementById('appSection').classList.add('hidden');
        }

        function showApp() {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('appSection').classList.remove('hidden');
            const payload = JSON.parse(atob(token.split('.')[1]));
            document.getElementById('usernameDisplay').textContent = '👤 ' + payload.sub;
            loadExpenses();
            loadBudgetStatus();
        }

        function showLogin() {
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('registerForm').classList.add('hidden');
        }

        function showRegister() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.remove('hidden');
        }

        function showAuthMessage(msg, isError) {
            const el = document.getElementById('authMessage');
            el.textContent = msg;
            el.className = 'alert ' + (isError ? 'alert-error' : 'alert-success');
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 3000);
        }

        async function register() {
            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;
            try {
                const res = await fetch(API_URL + '/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (res.ok) {
                    showAuthMessage('Регистрация успешна! Теперь войдите.', false);
                    showLogin();
                } else {
                    showAuthMessage(data.detail || 'Ошибка регистрации', true);
                }
            } catch (e) {
                showAuthMessage('Ошибка подключения к серверу', true);
            }
        }

        async function login() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            try {
                const formData = new URLSearchParams();
                formData.append('username', username);
                formData.append('password', password);
                const res = await fetch(API_URL + '/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });
                const data = await res.json();
                if (res.ok) {
                    token = data.access_token;
                    localStorage.setItem('token', token);
                    showApp();
                } else {
                    showAuthMessage(data.detail || 'Ошибка входа', true);
                }
            } catch (e) {
                showAuthMessage('Ошибка подключения к серверу', true);
            }
        }

        function logout() {
            localStorage.removeItem('token');
            token = null;
            showAuth();
        }

        function showTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabName + 'Tab').classList.add('active');
            event.target.classList.add('active');
            
            if (tabName === 'expenses') loadExpenses();
            if (tabName === 'budget') loadBudgetStatus();
            if (tabName === 'charts') loadCharts();
        }

        function getAuthHeaders() {
            return { 'Authorization': 'Bearer ' + token };
        }

        async function loadExpenses() {
            const params = new URLSearchParams();
            const category = document.getElementById('filterCategory').value;
            const minAmount = document.getElementById('filterMinAmount').value;
            const startDate = document.getElementById('filterStartDate').value;
            const endDate = document.getElementById('filterEndDate').value;
            const sortBy = document.getElementById('sortBy').value;
            const order = document.getElementById('sortOrder').value;
            const limit = document.getElementById('limit').value;

            if (category) params.append('category', category);
            if (minAmount) params.append('min_amount', minAmount);
            if (startDate) params.append('start_date', startDate);
            if (endDate) params.append('end_date', endDate);
            if (sortBy) params.append('sort_by', sortBy);
            if (order) params.append('order', order);
            if (limit) params.append('limit', limit);

            try {
                const res = await fetch(API_URL + '/expenses?' + params, {
                    headers: getAuthHeaders()
                });
                const expenses = await res.json();
                const tbody = document.getElementById('expensesTableBody');
                tbody.innerHTML = '';
                expenses.forEach(exp => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${exp.title}</td>
                        <td>${exp.category}</td>
                        <td>${exp.amount.toFixed(2)}</td>
                        <td>${new Date(exp.date).toLocaleDateString()}</td>
                        <td><button class="danger" onclick="deleteExpense(${exp.id})">Удалить</button></td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (e) {
                console.error('Ошибка загрузки расходов:', e);
            }
        }

        async function addExpense() {
            const title = document.getElementById('expenseTitle').value;
            const category = document.getElementById('expenseCategory').value;
            const amount = parseFloat(document.getElementById('expenseAmount').value);
            const date = document.getElementById('expenseDate').value || new Date().toISOString();

            try {
                const res = await fetch(API_URL + '/expenses', {
                    method: 'POST',
                    headers: { ...getAuthHeaders(), 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, category, amount, date })
                });
                const data = await res.json();
                const msgEl = document.getElementById('addExpenseMessage');
                if (res.ok) {
                    msgEl.textContent = 'Расход добавлен!';
                    msgEl.className = 'alert alert-success';
                    msgEl.classList.remove('hidden');
                    document.getElementById('expenseTitle').value = '';
                    document.getElementById('expenseCategory').value = '';
                    document.getElementById('expenseAmount').value = '';
                    setTimeout(() => msgEl.classList.add('hidden'), 3000);
                    loadExpenses();
                    loadBudgetStatus();
                } else {
                    msgEl.textContent = data.detail || 'Ошибка';
                    msgEl.className = 'alert alert-error';
                    msgEl.classList.remove('hidden');
                }
            } catch (e) {
                console.error('Ошибка:', e);
            }
        }

        async function deleteExpense(id) {
            if (!confirm('Удалить этот расход?')) return;
            try {
                await fetch(API_URL + '/expenses/' + id, {
                    method: 'DELETE',
                    headers: getAuthHeaders()
                });
                loadExpenses();
                loadBudgetStatus();
            } catch (e) {
                console.error('Ошибка:', e);
            }
        }

        async function addBudgetLimit() {
            const category = document.getElementById('budgetCategory').value || null;
            const limitAmount = parseFloat(document.getElementById('budgetLimitAmount').value);
            const period = document.getElementById('budgetPeriod').value;

            try {
                await fetch(API_URL + '/budget-limits', {
                    method: 'POST',
                    headers: { ...getAuthHeaders(), 'Content-Type': 'application/json' },
                    body: JSON.stringify({ category, limit_amount: limitAmount, period })
                });
                loadBudgetStatus();
            } catch (e) {
                console.error('Ошибка:', e);
            }
        }

        async function loadBudgetStatus() {
            try {
                const res = await fetch(API_URL + '/budget-status', {
                    headers: getAuthHeaders()
                });
                const statusList = await res.json();
                const container = document.getElementById('budgetStatus');
                container.innerHTML = '';
                statusList.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'budget-card' + (item.exceeded ? ' exceeded' : '');
                    card.innerHTML = `
                        <div class="limit">${item.limit.toFixed(2)} ₽</div>
                        <div class="spent">Потрачено: ${item.spent.toFixed(2)} ₽</div>
                        <div class="remaining">${item.exceeded 
                            ? '<span class="exceeded-text">⚠️ Превышен!</span>' 
                            : 'Остаток: ' + item.remaining.toFixed(2) + ' ₽'}
                        </div>
                        <div style="margin-top: 10px; font-size: 12px; color: #888;">
                            ${item.category || 'Общий'} • ${item.period}
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (e) {
                console.error('Ошибка:', e);
            }
        }

        async function loadCharts() {
            const startDate = document.getElementById('chartStartDate').value;
            const endDate = document.getElementById('chartEndDate').value;

            try {
                // График по категориям
                let catUrl = API_URL + '/charts/by-category';
                const catParams = new URLSearchParams();
                if (startDate) catParams.append('start_date', startDate);
                if (endDate) catParams.append('end_date', endDate);
                const catRes = await fetch(catUrl + '?' + catParams, { headers: getAuthHeaders() });
                const catData = await catRes.json();

                // График по датам
                let dateUrl = API_URL + '/charts/by-date';
                const dateRes = await fetch(dateUrl + '?' + catParams, { headers: getAuthHeaders() });
                const dateData = await dateRes.json();

                renderCategoryChart(catData);
                renderDateChart(dateData);
            } catch (e) {
                console.error('Ошибка:', e);
            }
        }

        function renderCategoryChart(data) {
            const ctx = document.getElementById('categoryChart').getContext('2d');
            if (categoryChartInstance) categoryChartInstance.destroy();

            const labels = data.map(d => d.category);
            const values = data.map(d => d.total);

            categoryChartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: values,
                        backgroundColor: [
                            '#667eea', '#764ba2', '#f093fb', '#f5576c',
                            '#4facfe', '#43e97b', '#fa709a', '#fee140'
                        ]
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { position: 'bottom' },
                        title: { display: true, text: 'Расходы по категориям' }
                    }
                }
            });
        }

        function renderDateChart(data) {
            const ctx = document.getElementById('dateChart').getContext('2d');
            if (dateChartInstance) dateChartInstance.destroy();

            const labels = data.map(d => d.date);
            const values = data.map(d => d.total);

            dateChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Расходы',
                        data: values,
                        borderColor: '#667eea',
                        backgroundColor: 'rgba(102, 126, 234, 0.1)',
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        title: { display: true, text: 'Расходы по дням' }
                    },
                    scales: {
                        y: { beginAtZero: true }
                    }
                }
            });
        }
    </script>
</body>
</html>
